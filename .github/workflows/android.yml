name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Pobierz repozytorium
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Ustaw JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Ustaw Android SDK i build-tools
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: 34.0.0
          emulator: false

      # 4️⃣ Zbuduj APK używając Gradle Wrapper
      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: ./ # upewnij się, że gradlew jest w root projektu

      # 5️⃣ Wgraj APK jako artefakt do pobrania
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

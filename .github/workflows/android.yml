name: Build APK

on:
  push:
    branches: [ "main" ]   # lub inna gałąź
  workflow_dispatch:       # pozwala uruchomić manualnie

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Pobranie kodu z repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Ustawienie JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Nadaj prawa wykonywania gradlew
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 4️⃣ Build APK
      - name: Build APK
        run: ./gradlew assembleDebug

      # 5️⃣ Upload APK jako artefakt
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
